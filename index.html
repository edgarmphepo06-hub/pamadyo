<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pamadyo Snack Centre</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">

<style>
:root{
  --primary:#ff2e63;
  --secondary:#ff9f1c;
  --dark:#0f172a;
  --bg:#f1f5f9;
}

*{margin:0;padding:0;box-sizing:border-box;font-family:Inter,sans-serif}
body{background:var(--bg);overflow-x:hidden}

/* LOADER (customer-catching simple animation) */
.loader{
position:fixed;
inset:0;
background:#0f172a;
display:flex;
align-items:center;
justify-content:center;
flex-direction:column;
z-index:9999;
color:#fff;
}
.loader div{
width:50px;
height:50px;
border:4px solid #fff;
border-top:4px solid var(--primary);
border-radius:50%;
animation:spin 1s linear infinite;
}
.loader span{
margin-top:10px;
font-weight:600;
letter-spacing:1px;
}
@keyframes spin{
100%{transform:rotate(360deg)}
}

/* NAV */
.navbar{
display:flex;
justify-content:space-between;
align-items:center;
padding:14px;
background:var(--dark);
color:#fff;
position:sticky;
top:0;
z-index:1000
}

.menu-btn{font-size:22px;cursor:pointer}

/* HERO (CHANGED TO hello.jpg) */
.hero{
height:85vh;
display:flex;
align-items:center;
justify-content:center;
text-align:center;
color:#fff;
background:url('hello.jpg') center/cover no-repeat;
position:relative;
}

.hero h1{
font-size:2.4rem;
z-index:2;
position:relative;
}

.hero::after{
content:"";
position:absolute;
inset:0;
background:rgba(0,0,0,.35);
}

/* SECTION */
.section{padding:30px 15px;max-width:1100px;margin:auto}
h2{margin:20px 0}

/* GRID */
.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(240px,1fr));
gap:15px
}

/* CARD */
.card{
background:#fff;
border-radius:12px;
overflow:hidden;
box-shadow:0 10px 20px rgba(0,0,0,.08);
transition:.3s
}
.card:hover{transform:translateY(-5px)}
.card img{width:100%;height:140px;object-fit:cover}
.card-body{padding:10px}
.card button{
margin-top:8px;
padding:8px 12px;
border:none;
border-radius:20px;
background:linear-gradient(45deg,var(--primary),var(--secondary));
color:#fff;
cursor:pointer
}

/* CART */
.cart{
position:fixed;
right:0;top:0;
width:340px;height:100%;
background:#fff;
transform:translateX(100%);
transition:.3s;
padding:12px;
z-index:2000;
overflow:auto
}
.cart.active{transform:translateX(0)}

.cart-item{
display:flex;
justify-content:space-between;
margin:6px 0;
font-size:14px
}

input{
width:100%;
padding:8px;
margin:5px 0;
border:1px solid #ddd;
border-radius:6px
}

.btn{
width:100%;
padding:10px;
border:none;
border-radius:8px;
margin-top:6px;
cursor:pointer
}
.send{background:var(--dark);color:#fff}
.clear{background:red;color:#fff}

/* FOOTER */
footer{
text-align:center;
padding:20px;
background:var(--dark);
color:#aaa
}
footer a{
color:#ff2e63;
text-decoration:none
}
</style>
</head>

<body>

<!-- LOADER -->
<div class="loader" id="loader">
<div></div>
<span>Loading Pamadyo...</span>
</div>

<!-- NAV -->
<div class="navbar">
<div class="menu-btn">☰</div>
<div>Pamadyo Snack Centre</div>
<div>🛒 <span id="count">0</span></div>
</div>

<!-- HERO -->
<div class="hero">
<h1>Fresh Food, Fast Delivery</h1>
</div>

<!-- MENU -->
<div class="section">

<h2>🍔 Snacks</h2>
<div class="grid">

<!-- CHANGED IMAGE HERE -->
<div class="card">
<img src="hello.jpg">
<div class="card-body">
<h3>Chips & Salad</h3>
<p>MWK 4,000</p>
<button onclick="add('Chips & Salad',4000)">Add</button>
</div>
</div>

<div class="card">
<img src="dsu.jpg">
<div class="card-body">
<h3>Chips & 2 Eggs</h3>
<p>MWK 6,000</p>
<button onclick="add('Chips & 2 Eggs',6000)">Add</button>
</div>
</div>

<div class="card">
<img src="usd.jpg">
<div class="card-body">
<h3>Chips & Chicken</h3>
<p>MWK 6,500</p>
<button onclick="add('Chips & Chicken',6500)">Add</button>
</div>
</div>

</div>

</div>

<!-- CART -->
<div class="cart" id="cart">
<h3>🧾 Order Receipt</h3>
<div id="items"></div>

<input id="name" placeholder="Name">
<input id="loc" placeholder="Location">
<input id="phone" placeholder="Phone">

<button class="btn send" onclick="checkout()">Send WhatsApp</button>
<button class="btn clear" onclick="clearCart()">Clear</button>
</div>

<!-- FOOTER -->
<footer>
© 2026 Pamadyo Snack Centre <br>
<a href="https://www.facebook.com/vincent.demoticmphepo" target="_blank">Facebook Page</a>
</footer>

<script>
let cart=[];

function add(n,p){
let f=cart.find(i=>i.name===n);
f?f.qty++:cart.push({name:n,price:p,qty:1});
render();
toggleCart(true);
}

function render(){
let h="",c=0;
cart.forEach(i=>{
c+=i.qty;
h+=`<div class="cart-item"><span>${i.name} x${i.qty}</span><b>${i.price*i.qty}</b></div>`;
});
document.getElementById("items").innerHTML=h;
document.getElementById("count").innerText=c;
}

function clearCart(){cart=[];render();}

function checkout(){
if(cart.length===0)return alert("Cart empty");

let n=name.value,l=loc.value,p=phone.value;
if(!n||!l||!p)return alert("Fill all fields");

let msg=`Order\nName:${n}\nPhone:${p}\nLocation:${l}\n---\n`;
let total=0;

cart.forEach(i=>{
let x=i.price*i.qty;
total+=x;
msg+=`${i.name} x${i.qty} = ${x}\n`;
});

msg+=`---\nTotal: MWK ${total}`;

window.open(`https://wa.me/265998136465?text=${encodeURIComponent(msg)}`);

cart=[];render();
}

/* LOADER OFF */
window.onload=()=>{
setTimeout(()=>document.getElementById("loader").style.display="none",1200);
}
</script>

</body>
</html>
